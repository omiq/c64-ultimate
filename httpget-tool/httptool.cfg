# --------------------------------------------------------------------
# Linker config: load at $C000, no crt0, no BASIC stub.
# User does LOAD"HTTPTOOL",8,1 then SYS 49152 to enter our entry table.
# --------------------------------------------------------------------

MEMORY {
    HEADER:   start = $0000, size = $0002, file = %O, fill = no;
    MAIN:     start = $C000, size = $1000, file = %O, fill = no;
    BSSRAM:   start = $D000, size = $0F00, file = "";
    ZP:       start = $0002, size = $001A, type = rw, define = yes;
}

SEGMENTS {
    EXEHDR:   load = HEADER, type = ro;     # 2-byte $C000 PRG header
    CODE:     load = MAIN,   type = ro;
    RODATA:   load = MAIN,   type = ro;
    DATA:     load = MAIN,   type = rw;
    BSS:      load = BSSRAM, type = bss, define = yes;
    ZEROPAGE: load = ZP,     type = zp;
}

FEATURES {
    STARTADDRESS: default = $C000;
}

SYMBOLS {
    __STACKSIZE__: type = weak, value = $0100;
}
