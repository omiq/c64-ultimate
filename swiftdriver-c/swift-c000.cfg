# --------------------------------------------------------------------
# Minimal ld65 config for a freestanding C64 driver at $C000.
# --------------------------------------------------------------------
#
# Bypasses cc65's c64-target crt0 (no main/exit/etc). We're producing
# a raw blob that the user LOADs at $C000 and enters via SYS 49152.
#
# File layout:
#   * 2-byte load address ($00 $C0)        from MEMORY "HEADER"
#   * code/rodata/data starting at $C000   from MEMORY "MAIN"
#   * uninitialised BSS lives in RAM but isn't written to the .prg
#
# Used with: cl65 -t none -C swift-c000.cfg ...
# --------------------------------------------------------------------

MEMORY {
    # 2-byte PRG load address emitted at start of file.
    HEADER:   start = $0000, size = $0002, file = %O, fill = no;

    # Code + initialised data live in the .prg starting at $C000.
    # Size is generous — driver is well under 1K.
    MAIN:     start = $C000, size = $1000, file = %O, fill = no;

    # BSS lives in RAM but not in the .prg. Park it just past MAIN.
    BSSRAM:   start = $D000, size = $0100, file = "";

    # Zero-page allocations cc65 may emit. We don't really use any
    # cc65-managed zp (everything is explicit at $A7/$A8/$F7 etc) but
    # the linker still needs the segment defined.
    ZP:       start = $0002, size = $001A, type = rw, define = yes;
}

SEGMENTS {
    EXEHDR:   load = HEADER, type = ro;
    CODE:     load = MAIN,   type = ro;
    RODATA:   load = MAIN,   type = ro;
    DATA:     load = MAIN,   type = rw;
    BSS:      load = BSSRAM, type = bss, define = yes;
    ZEROPAGE: load = ZP,     type = zp;
}

FEATURES {
    # Generate the 2-byte load address ($C000) automatically.
    STARTADDRESS: default = $C000;
}

SYMBOLS {
    # ld65 needs these defined when not using a target startup.
    __STACKSIZE__: type = weak, value = $0100;
}
